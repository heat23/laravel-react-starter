<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <!-- Background -->
  <rect width="1200" height="700" fill="#09090b"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="224" height="700" fill="#18181b"/>
  <line x1="224" y1="0" x2="224" y2="700" stroke="#27272a" stroke-width="1"/>

  <rect x="16" y="18" width="32" height="32" rx="8" fill="#818cf8"/>
  <text x="20" y="39" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#fff">H</text>
  <text x="56" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fafafa">HeatWare</text>
  <text x="56" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#71717a">Admin Panel</text>

  <line x1="12" y1="66" x2="212" y2="66" stroke="#27272a" stroke-width="1"/>

  <text x="32" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717a">Dashboard</text>
  <text x="32" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717a">Users</text>
  <text x="32" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717a">Billing</text>
  <text x="32" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717a">Audit Logs</text>
  <!-- Feature Flags (active) -->
  <rect x="8" y="202" width="208" height="34" rx="8" fill="#27272a"/>
  <rect x="22" y="213" width="3" height="12" rx="1.5" fill="#818cf8"/>
  <text x="32" y="224" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#fafafa">Feature Flags</text>
  <text x="32" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717a">Health</text>

  <!-- Main content -->
  <text x="248" y="42" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#fafafa">Feature Flags</text>
  <text x="248" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#71717a">Toggle features globally or per user without redeploying</text>
  <line x1="236" y1="76" x2="1188" y2="76" stroke="#27272a" stroke-width="1"/>

  <!-- Stat pills -->
  <rect x="248" y="92" width="120" height="50" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="268" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Total flags</text>
  <text x="268" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#fafafa">11</text>

  <rect x="382" y="92" width="130" height="50" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="402" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Enabled</text>
  <text x="402" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#4ade80">8</text>

  <rect x="526" y="92" width="150" height="50" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="546" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">DB overrides</text>
  <text x="546" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#facc15">3</text>

  <!-- Add override button -->
  <rect x="1054" y="92" width="122" height="34" rx="8" fill="#818cf8"/>
  <text x="1074" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#fff">+ Add Override</text>

  <!-- Table -->
  <rect x="248" y="160" width="928" height="490" rx="10" fill="#18181b" stroke="#27272a" stroke-width="1"/>

  <!-- Table header -->
  <rect x="248" y="160" width="928" height="38" rx="10" fill="#1c1c1e"/>
  <rect x="248" y="178" width="928" height="20" fill="#1c1c1e"/>
  <line x1="248" y1="198" x2="1176" y2="198" stroke="#27272a" stroke-width="1"/>

  <text x="272" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#71717a">FLAG</text>
  <text x="500" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#71717a">ENV VAR</text>
  <text x="730" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#71717a">WHAT IT ENABLES</text>
  <text x="1060" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#71717a">STATUS</text>

  <!-- Helper: toggle on (indigo) -->
  <!-- Toggle OFF shape: gray pill -->

  <!-- Row 1: billing.enabled — ON -->
  <text x="272" y="226" font-family="monospace, monospace" font-size="12" fill="#fafafa">billing.enabled</text>
  <text x="500" y="226" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_BILLING</text>
  <text x="730" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">Stripe billing, pricing, portal</text>
  <!-- Toggle ON -->
  <rect x="1060" y="214" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="224" r="8" fill="#fff"/>
  <line x1="272" y1="242" x2="1164" y2="242" stroke="#27272a" stroke-width="1"/>

  <!-- Row 2: admin.enabled — ON -->
  <text x="272" y="266" font-family="monospace, monospace" font-size="12" fill="#fafafa">admin.enabled</text>
  <text x="500" y="266" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_ADMIN</text>
  <text x="730" y="266" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">Admin panel, user management</text>
  <rect x="1060" y="254" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="264" r="8" fill="#fff"/>
  <line x1="272" y1="282" x2="1164" y2="282" stroke="#27272a" stroke-width="1"/>

  <!-- Row 3: two_factor.enabled — ON -->
  <text x="272" y="306" font-family="monospace, monospace" font-size="12" fill="#fafafa">two_factor.enabled</text>
  <text x="500" y="306" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_TWO_FACTOR</text>
  <text x="730" y="306" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">TOTP 2FA authentication</text>
  <rect x="1060" y="294" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="304" r="8" fill="#fff"/>
  <line x1="272" y1="322" x2="1164" y2="322" stroke="#27272a" stroke-width="1"/>

  <!-- Row 4: social_auth.enabled — ON (DB override) -->
  <text x="272" y="346" font-family="monospace, monospace" font-size="12" fill="#fafafa">social_auth.enabled</text>
  <text x="500" y="346" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_SOCIAL_AUTH</text>
  <text x="730" y="346" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">Google + GitHub OAuth</text>
  <rect x="1060" y="334" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="344" r="8" fill="#fff"/>
  <!-- DB override badge -->
  <rect x="1108" y="334" width="52" height="18" rx="6" fill="#facc15" fill-opacity="0.2"/>
  <text x="1113" y="347" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#facc15">DB override</text>
  <line x1="272" y1="362" x2="1164" y2="362" stroke="#27272a" stroke-width="1"/>

  <!-- Row 5: webhooks.enabled — ON -->
  <text x="272" y="386" font-family="monospace, monospace" font-size="12" fill="#fafafa">webhooks.enabled</text>
  <text x="500" y="386" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_WEBHOOKS</text>
  <text x="730" y="386" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">Incoming/outgoing webhooks</text>
  <rect x="1060" y="374" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="384" r="8" fill="#fff"/>
  <line x1="272" y1="402" x2="1164" y2="402" stroke="#27272a" stroke-width="1"/>

  <!-- Row 6: notifications.enabled — OFF -->
  <text x="272" y="426" font-family="monospace, monospace" font-size="12" fill="#71717a">notifications.enabled</text>
  <text x="500" y="426" font-family="monospace, monospace" font-size="12" fill="#52525b">FEATURE_NOTIFICATIONS</text>
  <text x="730" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#52525b">In-app notification system</text>
  <!-- Toggle OFF -->
  <rect x="1060" y="414" width="40" height="20" rx="10" fill="#3f3f46"/>
  <circle cx="1070" cy="424" r="8" fill="#71717a"/>
  <line x1="272" y1="442" x2="1164" y2="442" stroke="#27272a" stroke-width="1"/>

  <!-- Row 7: onboarding.enabled — OFF -->
  <text x="272" y="466" font-family="monospace, monospace" font-size="12" fill="#71717a">onboarding.enabled</text>
  <text x="500" y="466" font-family="monospace, monospace" font-size="12" fill="#52525b">FEATURE_ONBOARDING</text>
  <text x="730" y="466" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#52525b">Welcome wizard for new users</text>
  <rect x="1060" y="454" width="40" height="20" rx="10" fill="#3f3f46"/>
  <circle cx="1070" cy="464" r="8" fill="#71717a"/>
  <line x1="272" y1="482" x2="1164" y2="482" stroke="#27272a" stroke-width="1"/>

  <!-- Row 8: api_docs.enabled — OFF -->
  <text x="272" y="506" font-family="monospace, monospace" font-size="12" fill="#71717a">api_docs.enabled</text>
  <text x="500" y="506" font-family="monospace, monospace" font-size="12" fill="#52525b">FEATURE_API_DOCS</text>
  <text x="730" y="506" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#52525b">Scribe interactive API docs</text>
  <rect x="1060" y="494" width="40" height="20" rx="10" fill="#3f3f46"/>
  <circle cx="1070" cy="504" r="8" fill="#71717a"/>
  <line x1="272" y1="522" x2="1164" y2="522" stroke="#27272a" stroke-width="1"/>

  <!-- Row 9: email_verification (ON, default) -->
  <text x="272" y="546" font-family="monospace, monospace" font-size="12" fill="#fafafa">email_verification.enabled</text>
  <text x="500" y="546" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_EMAIL_VERIFICATION</text>
  <text x="730" y="546" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">Email verification flow</text>
  <rect x="1060" y="534" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="544" r="8" fill="#fff"/>
  <line x1="272" y1="562" x2="1164" y2="562" stroke="#27272a" stroke-width="1"/>

  <!-- Row 10: api_tokens (ON) -->
  <text x="272" y="586" font-family="monospace, monospace" font-size="12" fill="#fafafa">api_tokens.enabled</text>
  <text x="500" y="586" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_API_TOKENS</text>
  <text x="730" y="586" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">Sanctum token management UI</text>
  <rect x="1060" y="574" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="584" r="8" fill="#fff"/>
  <line x1="272" y1="602" x2="1164" y2="602" stroke="#27272a" stroke-width="1"/>

  <!-- Row 11: user_settings (ON) -->
  <text x="272" y="626" font-family="monospace, monospace" font-size="12" fill="#fafafa">user_settings.enabled</text>
  <text x="500" y="626" font-family="monospace, monospace" font-size="12" fill="#a1a1aa">FEATURE_USER_SETTINGS</text>
  <text x="730" y="626" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">Theme and timezone persistence</text>
  <rect x="1060" y="614" width="40" height="20" rx="10" fill="#818cf8"/>
  <circle cx="1090" cy="624" r="8" fill="#fff"/>

  <!-- Footer note -->
  <text x="248" y="668" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#3f3f46">Flag changes take effect immediately · database overrides override .env defaults</text>
</svg>
